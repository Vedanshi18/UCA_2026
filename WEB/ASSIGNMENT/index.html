<!DOCTYPE html>
<html>

<head>
    <title>Users</title>
</head>

<body>
    <script>
        const worker = new Worker("worker.js");
        worker.postMessage("start");
        worker.onmessage = function (event) {
            const users = event.data;
            if (users.length == 0) {
                console.log("No users found");
                return;
            }
            for (let i = 0; i < users.length; i++) {
                console.log(
                    users[i].name + " - " +
                    (users[i].active ? "Active" : "Inactive")
                );
            }
        };
    </script>
</body>
</html>
