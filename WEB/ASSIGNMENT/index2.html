<!DOCTYPE html>
<html>
<head>
    <title>Users</title>
</head>

<body>
    <div id="users"></div>

    <script>
        var worker = new Worker("worker2.js");
        worker.postMessage("start");
        worker.onmessage = function (event) {
            var users = event.data;
            var div = document.getElementById("users");

            if (users.length == 0) {
                div.innerHTML = "No users found";
                return;
            }

            for (var i = 0; i < users.length; i++) {
                div.innerHTML += users[i].name + " - ";
                if (users[i].active)
                    div.innerHTML += "Active";
                else
                    div.innerHTML += "Inactive";
                div.innerHTML += "<br>";
            }
        };
    </script>

</body>
</html>
